name: Refresh Static FPL Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate static predictions
        run: python generate_static_data.py

      - name: Commit updated static data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/static_predictions.json data/cache.json
          git diff --cached --quiet || git commit -m "Refresh static FPL prediction data"
          git push
